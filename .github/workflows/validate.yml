name: Validate GeoJSON

on:
  pull_request:
    branches: [main]

jobs:
  validate-geojson:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install geojson-validation
        run: npm install -g geojsonhint

      - name: Validate neighborhoods.geojson
        run: geojsonhint data/neighborhoods.geojson